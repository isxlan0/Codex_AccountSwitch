name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Codex_AccountSwitch\Codex_AccountSwitch.vcxproj -PackagesDirectory packages

      - name: Build Release x64
        run: msbuild Codex_AccountSwitch\Codex_AccountSwitch.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:OutDir=${{ github.workspace }}\x64\Release\ /m

      - name: Install Inno Setup
        shell: powershell
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }

      - name: Build installer
        shell: powershell
        run: .\installer\build_installer.ps1 -IsccPath "iscc"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex_AccountSwitch_Setup_windows_x64
          path: dist\Codex_AccountSwitch_Setup_*.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex_AccountSwitch_Portable_windows_x64
          path: dist\Codex_AccountSwitch_Portable_*.zip
          if-no-files-found: error
