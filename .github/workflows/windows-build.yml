name: Windows CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: x64
            msbuild_platform: x64
            package_arch: x64
          - arch_label: x86
            msbuild_platform: Win32
            package_arch: x86
          - arch_label: ARM
            msbuild_platform: ARM64
            package_arch: arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Codex_AccountSwitch\Codex_AccountSwitch.vcxproj -PackagesDirectory packages

      - name: Build Release (${{ matrix.arch_label }})
        run: msbuild Codex_AccountSwitch\Codex_AccountSwitch.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.msbuild_platform }} /p:PlatformToolset=v143 /m

      - name: Install Inno Setup
        shell: powershell
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }

      - name: Build installer
        shell: powershell
        run: .\installer\build_installer.ps1 -IsccPath "iscc" -TargetPlatform "windows" -TargetArchitecture "${{ matrix.package_arch }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex_AccountSwitch_Setup_windows_${{ matrix.package_arch }}
          path: dist\Codex_AccountSwitch_Setup_windows_${{ matrix.package_arch }}_*.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex_AccountSwitch_Portable_windows_${{ matrix.package_arch }}
          path: dist\Codex_AccountSwitch_Portable_windows_${{ matrix.package_arch }}_*.zip
          if-no-files-found: error
